version: "3.9"

services:
  frontend-react:
    image: node:20-alpine
    container_name: react-vite-app
    working_dir: /app
    ports:
      - "5174:5173"  # thay đổi cổng
    volumes:
      - ..:/app
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - NODE_ENV=development